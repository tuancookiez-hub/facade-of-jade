<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Facade of Jade — 3D Prototype</title>
  <link rel="stylesheet" href="./server_static/scene3d.css" />
</head>
<body>
  <main id="game-shell" aria-label="Facade of Jade lightweight 3D prototype">
    <canvas id="scene-canvas" aria-label="Low fidelity 3D teahouse scene"></canvas>

    <div id="hud">
      <header id="scene-header">
        <div>
          <p class="eyebrow">Facade of Jade</p>
          <h1>Jade Mountain Teahouse</h1>
        </div>
        <a href="/" id="classic-link">classic view</a>
      </header>

      <div id="interaction-hint">WASD to move · Drag to look · Approach Master Liang</div>

      <section id="npc-bubble" aria-live="polite">
        <div id="npc-name">Master Liang</div>
        <div id="npc-line">The rain holds its breath. Master Liang watches you from across the table.</div>
      </section>

      <section id="player-utterance" aria-live="polite">
        <div id="player-name">You</div>
        <div id="player-line">Choose a response or type your own words.</div>
      </section>

      <section id="player-bar" aria-label="Player response controls">
        <div id="quick-actions" aria-label="Quick actions">
          <button type="button" data-prompt="Master Liang, I came here to apologize.">Apologize</button>
          <button type="button" data-prompt="What happened to the jade seal?">Ask seal</button>
          <button type="button" data-prompt="If you will not answer, draw your blade.">Challenge</button>
          <button type="button" data-prompt="I remain silent.">Stay silent</button>
        </div>

        <form id="chat-form">
          <input id="message-input" name="message" autocomplete="off" placeholder="Speak to Master Liang..." />
          <button id="send-button" type="submit">Speak</button>
        </form>

        <footer id="state-strip">
          <span>Mood: <strong id="mood-value">wary</strong></span>
          <span>Trust: <strong id="trust-value">15</strong></span>
          <span>Tension: <strong id="tension-value">35</strong></span>
          <span>Route: <strong id="route-value">intro</strong></span>
        </footer>
      </section>
    </div>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="./server_static/scene3d.js"></script>
</body>
</html>
